name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build and validate static site
        env:
          SITE_BASE: ${{ steps.pages.outputs.base_path }}/
        run: |
          set -euo pipefail
          docker build \
            --build-arg "SITE_BASE=${SITE_BASE}" \
            --target site \
            --tag learn-llm-site:pages \
            .

      - name: Export static artifact
        run: |
          set -euo pipefail
          mkdir pages-artifact
          container_id="$(docker create learn-llm-site:pages)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker cp "${container_id}:/usr/share/nginx/html/." pages-artifact/
          docker rm "$container_id" >/dev/null
          trap - EXIT
          test -f pages-artifact/index.html
          test -f pages-artifact/en/course/index.html
          test -f pages-artifact/ru/course/index.html
          test -z "$(find pages-artifact -type l -print -quit)"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
