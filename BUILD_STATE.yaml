schema_version: 1
updated_at: "2026-07-20T18:01:30Z"

environment:
  os: "Linux x86_64"
  execution: "Docker-only build and validation; host use is limited to Docker, Docker Compose, Git, and repository orchestration."
  docker: "25.0.2"
  docker_compose: "2.17.3"
  rustc: "1.93.1"
  cargo: "1.93.1"
  node: "23.7.0"
  npm: "10.9.2"
  git: "2.53.0"
  notes: "Bootstrap snapshot; pin exact versions when the implementation toolchain is selected."

active_build: complete-decoder-course

builds:
  - build_id: bootstrap-course
    objective: "Select the course architecture and establish the first implementable course plan."
    status: completed
    budget:
      unit: agent-session
      limit: null
      spent: 1
      notes: "No explicit resource budget has been supplied. Estimate and seek approval for large or paid work."
    completion_criteria:
      - "Architecture and toolchain decisions are recorded."
      - "The course is decomposed into dependency-ordered, independently verifiable steps."
    steps:
      - id: define-course-architecture
        objective: "Choose the static-site toolchain, repository layout, validation strategy, and initial chapter sequence."
        depends_on: []
        status: completed
        inputs:
          - AGENTS.md
          - DECISIONS.md
        outputs:
          - DECISIONS.md
          - BUILD_STATE.yaml
        acceptance:
          - "Decisions cover the static-site toolchain, Rust example layout, tests, and chapter template."
          - "Decisions cover English/Russian localization, locale routing, translation parity, and locale-aware validation."
          - "Follow-up implementation work is split into ordered steps with explicit acceptance and validation."
        validate:
          - "Manual review against AGENTS.md learning objectives and orchestration rules"
        cost:
          class: small
          notes: "Local planning and repository edits only."
        runs:
          - run_id: 20260718T082007Z-define-course-architecture-01
            started_at: "2026-07-18T08:20:07Z"
