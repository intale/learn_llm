        status: completed
        inputs:
          - AGENTS.md
          - DECISIONS.md
        outputs:
          - DECISIONS.md
          - BUILD_STATE.yaml
        acceptance:
          - "Decisions cover the static-site toolchain, Rust example layout, tests, and chapter template."
          - "Decisions cover English/Russian localization, locale routing, translation parity, and locale-aware validation."
          - "Follow-up implementation work is split into ordered steps with explicit acceptance and validation."
        validate:
          - "Manual review against AGENTS.md learning objectives and orchestration rules"
        cost:
          class: small
          notes: "Local planning and repository edits only."
        runs:
