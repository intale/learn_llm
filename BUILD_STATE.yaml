  - build_id: foundation-and-chapter-01
    objective: "Establish the bilingual static/Rust toolchains and deliver a validated English/Russian chapter about text units and vocabulary IDs."
    status: completed
    budget:
      unit: agent-session
      limit: null
      spent: 9
      notes: "No explicit resource budget has been supplied. The localized site scaffold has declared npm-registry and browser-download inputs; no paid services are planned."
    completion_criteria:
      - "The Rust workspace and localized static site build reproducibly from lockfiles."
      - "Chapter 1 meets the content contract in English and Russian and uses tested shared Rust source."
      - "Both localized routes, visualization, links, language switcher, and translation parity pass production and browser checks."
    steps:
      - id: scaffold-rust-workspace
        objective: "Create the locked Cargo workspace, empty cumulative teaching crate, and dependency-policy check."
        depends_on:
          - define-course-architecture
        status: completed
        inputs:
          - AGENTS.md
          - DECISIONS.md
          - "environment.rustc=1.93.1"
          - "environment.cargo=1.93.1"
        outputs:
          - .gitignore
          - Cargo.toml
          - Cargo.lock
          - rust/crates/llm-from-scratch/Cargo.toml
          - rust/crates/llm-from-scratch/src/lib.rs
          - rust/demos/chapter-demo-template/Cargo.toml
          - rust/demos/chapter-demo-template/src/main.rs
          - scripts/check-rust-dependencies.sh
        acceptance:
          - "The root workspace discovers cumulative crates and chapter demos without later edits to the workspace manifest."
          - "A dependency-free chapter-demo template keeps Cargo's demo-member glob valid before chapter 1 exists."
          - "The teaching crate formats, compiles, and tests with a locked dependency graph."
          - "The dependency check rejects undeclared concept-implementing crates."
          - "Rust and already-planned static-site build artifacts are ignored without discarding existing ignore rules."
        validate:
          - "cargo metadata --no-deps --format-version 1"
          - "cargo fmt --all -- --check"
          - "cargo test --workspace --locked"
          - "scripts/check-rust-dependencies.sh"
        cost:
          class: small
          notes: "Local Rust scaffolding only; begin with the standard library and no network dependency resolution."
